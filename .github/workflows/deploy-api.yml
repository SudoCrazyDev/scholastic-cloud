# Deploy API to Production and VIP/self-hosting clients.
# Build runs once; the same package is deployed to every target in the matrix.
# To add a new client: add a GitHub Environment with secrets (see docs), then add its slug below.

name: Deploy API to Production

on:
  push:
    branches: [ master ]
    paths:
      - 'api/**'
  workflow_dispatch:

env:
  ZIP_NAME: api-deployment-${{ github.run_id }}-${{ github.sha }}.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: api/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: |
          cd api
          composer install --optimize-autoloader --no-dev

      - name: Optimize Laravel
        run: |
          cd api
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Create deployment package
        run: |
          mkdir -p deploy-temp
          rsync -av --exclude='node_modules' \
                   --exclude='.git' \
                   --exclude='.env.example' \
                   --exclude='tests' \
                   --exclude='phpunit.xml' \
                   --exclude='Dockerfile' \
                   --exclude='README.md' \
                   api/ deploy-temp/
          cd deploy-temp
          zip -r ../${ZIP_NAME} .
          cd ..
          mkdir -p deploy-out
          mv -f ${ZIP_NAME} deploy-out/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deployment-package
          path: deploy-out/${{ env.ZIP_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        deployment_target: [prod, maranatha]
    environment: ${{ matrix.deployment_target }}
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: api-deployment-package

      - name: Prepare zip for upload
        run: |
          if [ -f "deploy-out/${{ env.ZIP_NAME }}" ]; then
            cp "deploy-out/${{ env.ZIP_NAME }}" ./api-deploy.zip
          else
            cp "$(find . -name '*.zip' -type f | head -1)" ./api-deploy.zip
          fi
          ls -la api-deploy.zip

      - name: Validate deployment secrets
        run: |
          missing=""
          [ -z "$SSH_SERVER" ]   && missing="$missing DEPLOYMENT_SSH_SERVER"
          [ -z "$SSH_USERNAME" ] && missing="$missing DEPLOYMENT_SSH_USERNAME"
          [ -z "$SSH_PASSWORD" ] && missing="$missing DEPLOYMENT_SSH_PASSWORD"
          [ -z "$SSH_PORT" ]     && missing="$missing DEPLOYMENT_SSH_PORT"
          [ -z "$REMOTE_DIR" ]   && missing="$missing DEPLOYMENT_REMOTE_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty secrets for '${{ matrix.deployment_target }}':$missing"
            echo "Add them in Settings → Environments → ${{ matrix.deployment_target }} → Environment secrets."
            exit 1
          fi
          echo "All deployment secrets are set for ${{ matrix.deployment_target }} (host length=${#SSH_SERVER}, user length=${#SSH_USERNAME}, port=$SSH_PORT)"
        env:
          SSH_SERVER: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          SSH_USERNAME: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          REMOTE_DIR: ${{ secrets.DEPLOYMENT_REMOTE_DIR }}

      - name: Check SSH reachability
        run: |
          if ! timeout 25 bash -c "exec 3<>/dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null; then
            echo "::error::Cannot reach server (connection timed out). The deployment host must allow inbound TCP on the SSH port from GitHub Actions runners (dynamic IPs). Allow GitHub IPs (https://api.github.com/meta) or use a self-hosted runner. See .github/VIP-DEPLOYMENTS.md#dial-tcp--io-timeout-on-api-sftp-deploy"
            exit 1
          fi
          echo "Server is reachable"
        env:
          SSH_HOST: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          SSH_PORT: ${{ secrets.DEPLOYMENT_SSH_PORT }}

      # SCP/drone-scp require the target directory to exist; it does not create it.
      - name: Ensure remote directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          timeout: "120s"
          script: |
            set -e
            REMOTE_DIR="${{ secrets.DEPLOYMENT_REMOTE_DIR }}"
            case "$REMOTE_DIR" in
              "~") REMOTE_DIR="$HOME" ;;
              "~/"*) REMOTE_DIR="$HOME/${REMOTE_DIR#~/}" ;;
            esac

            if [ -d "$REMOTE_DIR" ]; then
              echo "Target directory already exists: $REMOTE_DIR"
            elif ! mkdir -p "$REMOTE_DIR"; then
              echo "::error::Cannot create DEPLOYMENT_REMOTE_DIR='$REMOTE_DIR' as user $(whoami). Use a writable absolute path (example: /home/<user>/domains/<site>/public_html/v2/)."
              exit 1
            fi
            echo "Target directory ready: $REMOTE_DIR"

      - name: Upload deployment zip (SFTP) to ${{ matrix.deployment_target }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          source: "api-deploy.zip"
          target: ${{ secrets.DEPLOYMENT_REMOTE_DIR }}
          timeout: "120s"
          debug: true

      - name: Extract and setup on server (${{ matrix.deployment_target }})
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          command_timeout: "10m"
          timeout: "120s"
          script: |
            set -e
            REMOTE_DIR="${{ secrets.DEPLOYMENT_REMOTE_DIR }}"
            case "$REMOTE_DIR" in
              "~") REMOTE_DIR="$HOME" ;;
              "~/"*) REMOTE_DIR="$HOME/${REMOTE_DIR#~/}" ;;
            esac
            if [ ! -d "$REMOTE_DIR" ]; then
              echo "::error::Deployment directory does not exist or is not accessible: $REMOTE_DIR"
              exit 1
            fi
            cd "$REMOTE_DIR"
            echo "Working in: $REMOTE_DIR ($(pwd))"
            ls -la
            ZIP_FILE="api-deploy.zip"
            if [ ! -f "$ZIP_FILE" ]; then
              echo "Zip not found: $ZIP_FILE" && exit 1
            fi
            echo "Found zip: $ZIP_FILE"

            BACKUP_DIR=""
            if [ -d "api" ]; then
              BACKUP_DIR="api-backup-$(date +%Y%m%d-%H%M%S)"
              mv api "$BACKUP_DIR"
              echo "Backup created: $BACKUP_DIR"
            fi

            unzip -o "$ZIP_FILE" -d api/

            if [ -n "$BACKUP_DIR" ] && [ -f "$BACKUP_DIR/.env" ]; then
              cp "$BACKUP_DIR/.env" api/.env
              echo "✓ .env restored from backup"
            fi

            mkdir -p api/storage/logs api/storage/framework/cache api/storage/framework/sessions api/storage/framework/views api/bootstrap/cache
            find api/ -type d -exec chmod 755 {} \;
            find api/ -type f -exec chmod 644 {} \;
            chmod -R 775 api/storage api/bootstrap/cache
            chmod -R 775 api/storage/logs api/storage/framework api/storage/app
            [ -f api/.env ] && chmod 644 api/.env
            chown -R $USER:$USER api/ 2>/dev/null || true
            rm -rf api/bootstrap/cache/* api/storage/framework/cache/* api/storage/framework/views/* api/storage/framework/sessions/* api/storage/logs/* 2>/dev/null || true
            chmod -R 775 api/storage api/bootstrap/cache

            echo "=== Running Laravel migrations ==="
            cd api && php artisan migrate --force && cd ..
            echo "✓ Migrations completed"

            if [ -f api/public/.htaccess ]; then cp -f api/public/.htaccess ./.htaccess; fi
            if [ -f api/public/index.php ]; then
              cp -f api/public/index.php ./index.php
              sed -i "s#__DIR__.'/../vendor/autoload.php'#__DIR__.'/api/vendor/autoload.php'#" ./index.php || true
              sed -i "s#__DIR__.'/../bootstrap/app.php'#__DIR__.'/api/bootstrap/app.php'#" ./index.php || true
            fi

            rm -f "$ZIP_FILE"
            echo "=== Deploy complete ==="
            ls -la api/ | head -5
            [ -f api/vendor/autoload.php ] && echo "✓ autoload.php OK" || echo "✗ autoload.php missing"
            [ -f api/bootstrap/app.php ] && echo "✓ app.php OK" || echo "✗ app.php missing"