name: Deploy Website to Production

on:
  push:
    branches: [ master ]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Check required secrets
      - name: Check required secrets
        env:
          DEPLOYMENT_SERVER: ${{ secrets.DEPLOYMENT_SERVER }}
          DEPLOYMENT_USERNAME: ${{ secrets.DEPLOYMENT_USERNAME }}
          DEPLOYMENT_PASSWORD: ${{ secrets.DEPLOYMENT_PASSWORD }}
        run: |
          missing=()
          [ -z "$DEPLOYMENT_SERVER" ] && missing+=("DEPLOYMENT_SERVER")
          [ -z "$DEPLOYMENT_USERNAME" ] && missing+=("DEPLOYMENT_USERNAME")
          [ -z "$DEPLOYMENT_PASSWORD" ] && missing+=("DEPLOYMENT_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present"

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 4: Install dependencies and build the project
      - name: Install dependencies and build
        env:
          PUBLIC_ADS: ${{ secrets.PUBLIC_ADS }}
        run: |
          cd website
          npm ci
          npm run build  # This builds your Astro project into the 'dist' folder

      # Step 5: Deploy the dist folder to Hostinger using FTP
      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEPLOYMENT_SERVER }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_PASSWORD }}
          local-dir: website/dist/
          server-dir: "~/domains/scholastic.cloud/public_html/"
