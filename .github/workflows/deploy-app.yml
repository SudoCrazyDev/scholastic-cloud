# Deploy APP to Production and VIP/self-hosting clients.
# Each push to master (app/**) builds and deploys to every target in the matrix.
# To add a new client: add a GitHub Environment (Settings → Environments) with the same
# secret names, then add its slug to the deployment_targets matrix below.

name: Deploy APP to Production

on:
  push:
    branches: [ master ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Deploy to other targets even if one fails
      matrix:
        # Your production + each VIP/self-hosting client. Add new clients here.
        deployment_target: [prod, maranatha]
    environment: ${{ matrix.deployment_target }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate deployment secrets
        run: |
          missing=""
          [ -z "$ENV_FILE_CONTENT" ] && missing="$missing ENV_FILE_CONTENT"
          [ -z "$SSH_SERVER" ]       && missing="$missing DEPLOYMENT_SSH_SERVER"
          [ -z "$SSH_USERNAME" ]     && missing="$missing DEPLOYMENT_SSH_USERNAME"
          [ -z "$SSH_PASSWORD" ]     && missing="$missing DEPLOYMENT_SSH_PASSWORD"
          [ -z "$SSH_PORT" ]         && missing="$missing DEPLOYMENT_SSH_PORT"
          [ -z "$REMOTE_DIR" ]       && missing="$missing DEPLOYMENT_DIRECTORY"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty secrets for '${{ matrix.deployment_target }}':$missing"
            echo "Add them in Settings -> Environments -> ${{ matrix.deployment_target }} -> Environment secrets."
            exit 1
          fi
          echo "All deployment secrets are set for ${{ matrix.deployment_target }} (host length=${#SSH_SERVER}, user length=${#SSH_USERNAME}, port=$SSH_PORT)"
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          SSH_SERVER: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          SSH_USERNAME: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          REMOTE_DIR: ${{ secrets.DEPLOYMENT_DIRECTORY }}

      - name: Check SSH reachability
        run: |
          if ! timeout 25 bash -c "exec 3<>/dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null; then
            echo "::error::Cannot reach server (connection timed out). The deployment host must allow inbound TCP on the SSH port from GitHub Actions runners (dynamic IPs). Allow GitHub IPs (https://api.github.com/meta) or use a self-hosted runner."
            exit 1
          fi
          echo "Server is reachable"
        env:
          SSH_HOST: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          SSH_PORT: ${{ secrets.DEPLOYMENT_SSH_PORT }}

      - name: Create .env file
        run: |
          cd app
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}

      - name: Install dependencies and build
        run: |
          cd app
          npm ci
          npm run build

      - name: Prepare app package
        run: |
          cd app/dist
          zip -r ../../app-deploy.zip .
          cd ../..
          ls -la app-deploy.zip

      - name: Ensure remote directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          timeout: "120s"
          script: |
            set -e
            REMOTE_DIR="${{ secrets.DEPLOYMENT_DIRECTORY }}"
            case "$REMOTE_DIR" in
              "~") REMOTE_DIR="$HOME" ;;
              "~/"*) REMOTE_DIR="$HOME/${REMOTE_DIR#~/}" ;;
            esac
            if [ -d "$REMOTE_DIR" ]; then
              echo "Target directory already exists: $REMOTE_DIR"
            elif ! mkdir -p "$REMOTE_DIR"; then
              echo "::error::Cannot create DEPLOYMENT_DIRECTORY='$REMOTE_DIR' as user $(whoami). Use a writable absolute path."
              exit 1
            fi
            echo "Target directory ready: $REMOTE_DIR"

      - name: Upload app package (SFTP) to ${{ matrix.deployment_target }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          source: "app-deploy.zip"
          # Upload to a deterministic location first, then move/extract via SSH.
          target: "/tmp/"
          timeout: "120s"
          debug: true

      - name: Extract app package on server (${{ matrix.deployment_target }})
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_SERVER }}
          username: ${{ secrets.DEPLOYMENT_SSH_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOYMENT_SSH_PORT }}
          timeout: "120s"
          command_timeout: "10m"
          script: |
            set -e
            REMOTE_DIR="${{ secrets.DEPLOYMENT_DIRECTORY }}"
            case "$REMOTE_DIR" in
              "~") REMOTE_DIR="$HOME" ;;
              "~/"*) REMOTE_DIR="$HOME/${REMOTE_DIR#~/}" ;;
            esac
            cd "$REMOTE_DIR"
            ZIP_FILE="app-deploy.zip"
            if [ -f "/tmp/$ZIP_FILE" ]; then
              mv -f "/tmp/$ZIP_FILE" "./$ZIP_FILE"
            fi
            if [ ! -f "$ZIP_FILE" ]; then
              echo "Zip not found: $ZIP_FILE" && exit 1
            fi
            unzip -o "$ZIP_FILE"
            rm -f "$ZIP_FILE"
            echo "App deploy complete in $REMOTE_DIR"
