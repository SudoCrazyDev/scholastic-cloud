# Deploy APP to Production and VIP/self-hosting clients.
# Each push to master (app/**) builds and deploys to every target in the matrix.
# To add a new client: add a GitHub Environment (Settings → Environments) with the same
# secret names, then add its slug to the deployment_targets matrix below.

name: Deploy APP to Production

on:
  push:
    branches: [ master ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Deploy to other targets even if one fails
      matrix:
        # Your production + each VIP/self-hosting client. Add new clients here.
        deployment_target: [prod, maranatha]
    environment: ${{ matrix.deployment_target }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate deployment secrets
        run: |
          missing=""
          [ -z "$ENV_FILE_CONTENT" ]      && missing="$missing ENV_FILE_CONTENT"
          [ -z "$FTP_SERVER" ]            && missing="$missing DEPLOYMENT_SERVER"
          [ -z "$FTP_USERNAME" ]          && missing="$missing DEPLOYMENT_USERNAME"
          [ -z "$FTP_PASSWORD" ]          && missing="$missing DEPLOYMENT_PASSWORD"
          [ -z "$FTP_REMOTE_DIRECTORY" ]  && missing="$missing DEPLOYMENT_DIRECTORY"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty secrets for '${{ matrix.deployment_target }}':$missing"
            echo "Add them in Settings -> Environments -> ${{ matrix.deployment_target }} -> Environment secrets."
            exit 1
          fi
          echo "All deployment secrets are set for ${{ matrix.deployment_target }} (server length=${#FTP_SERVER}, user length=${#FTP_USERNAME})"
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          FTP_SERVER: ${{ secrets.DEPLOYMENT_SERVER }}
          FTP_USERNAME: ${{ secrets.DEPLOYMENT_USERNAME }}
          FTP_PASSWORD: ${{ secrets.DEPLOYMENT_PASSWORD }}
          FTP_REMOTE_DIRECTORY: ${{ secrets.DEPLOYMENT_DIRECTORY }}

      - name: Check FTP reachability
        run: |
          if timeout 20 bash -c "exec 3<>/dev/tcp/$FTP_SERVER/21" 2>/dev/null; then
            echo "FTP server is reachable on port 21"
          else
            echo "::warning::Cannot verify FTP on port 21 for $FTP_SERVER. If your host uses a custom FTP/FTPS port, this check may fail while deploy still works. Confirm DEPLOYMENT_SERVER and provider firewall rules."
          fi
        env:
          FTP_SERVER: ${{ secrets.DEPLOYMENT_SERVER }}

      - name: Create .env file
        run: |
          cd app
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}

      - name: Install dependencies and build
        run: |
          cd app
          npm ci
          npm run build

      - name: Deploy to FTP server (${{ matrix.deployment_target }})
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEPLOYMENT_SERVER }}
          username: ${{ secrets.DEPLOYMENT_USERNAME }}
          password: ${{ secrets.DEPLOYMENT_PASSWORD }}
          local-dir: app/dist/
          server-dir: ${{ secrets.DEPLOYMENT_DIRECTORY }}
